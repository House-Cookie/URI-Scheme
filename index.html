<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probador de URI Schemes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box; /* Para que el padding no afecte el ancho */
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #resultContainer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: none; /* Oculto por defecto */
        }

        .generated-link {
            display: inline-block;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            word-break: break-all;
        }

        .generated-link:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }

        .uri-preview {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Abrir App vía URI Scheme</h1>
        <p style="color: #666; font-size: 0.9rem;">Introduce el esquema (ej. <code>spotify:track:123</code> o <code>mailto:hola@test.com</code>)</p>
        
        <input type="text" id="uriInput" placeholder="Pega tu URI aquí...">
        <button onclick="generarEnlace()">Generar Botón</button>

        <div id="resultContainer">
            <span class="uri-preview" id="previewText"></span>
            <a href="#" id="dynamicLink" class="generated-link" target="_blank">Abrir Aplicación 🚀</a>
        </div>
    </div>

    <script>
        function generarEnlace() {
            // 1. Obtener el valor del input
            const inputVal = document.getElementById('uriInput').value.trim();
            const container = document.getElementById('resultContainer');
            const link = document.getElementById('dynamicLink');
            const preview = document.getElementById('previewText');

            // 2. Validar que no esté vacío
            if (inputVal === "") {
                alert("Por favor escribe un URI Scheme primero.");
                container.style.display = 'none';
                return;
            }

            // 3. Asignar el valor al atributo href del enlace
            link.href = inputVal;
            
            // 4. Mostrar qué se va a abrir (texto pequeño)
            preview.textContent = "Destino: " + inputVal;

            // 5. Hacer visible el contenedor
            container.style.display = 'block';
        }

        // Opcional: Generar al presionar Enter
        document.getElementById("uriInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                generarEnlace();
            }
        });
    </script>

</body>
</html>
